name: Deploy Bite API to Home Server

on:
  push:
    branches: ["main"]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy_guard
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_PORT" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Connectivity preflight
        if: steps.deploy_guard.outputs.enabled == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          timeout 5 bash -c "echo >/dev/tcp/$SSH_HOST/$SSH_PORT" 2>/dev/null \
            && echo "SSH port reachable" \
            || { echo "::warning::SSH port unreachable – skipping deploy"; echo "enabled=false" >> "$GITHUB_OUTPUT"; }

      - name: Upload bite-api source
        if: steps.deploy_guard.outputs.enabled == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "~/projects/bite-api"

      - name: Restart bite-api on home server
        if: steps.deploy_guard.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/projects/infra
            docker compose build bite-api
            docker compose up -d bite-api
            ATTEMPTS=15
            for i in $(seq 1 $ATTEMPTS); do
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || true)
              if [ "$STATUS_CODE" = "200" ]; then
                exit 0
              fi
              sleep 4
            done
            echo "health check failed"
            exit 1
